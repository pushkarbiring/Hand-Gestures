<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GPU Gesture Particles</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #030303; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        #videoElement { display: none; }
        #ui { position: absolute; top: 15px; left: 15px; color: rgba(255,255,255,0.85); pointer-events: none; text-shadow: 1px 1px 4px rgba(0,0,0,0.8); z-index: 10; max-width: 350px; }
        h2 { margin: 0 0 5px 0; font-weight: 600; font-size: 1.4rem; letter-spacing: 0.5px; }
        #status { font-weight: bold; color: #00d2ff; margin-bottom: 15px; font-size: 0.9rem; }
        p { margin: 6px 0; font-size: 0.9rem; }
        @media (max-width: 600px) { #ui h2 { font-size: 1.2rem; } p, #status { font-size: 0.8rem; } }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
</head>
<body>
    <div id="ui">
        <h2>✨ Neural Particles</h2>
        <p id="status">Initializing Engine...</p>
        <p>🖐️ <b>Open Hand:</b> Expand Swarm</p>
        <p>✊ <b>Closed Fist:</b> Shrink & Color Shift</p>
        <p>🤏 <b>Pinch:</b> Morph Shape (7 Available)</p>
    </div>
    
    <video id="videoElement" autoplay playsinline></video>

    <script id="vertexShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform float uMorphProgress; 
        uniform float uScale;
        
        attribute vec3 position1; 
        attribute vec3 color1;    
        
        varying vec3 vColor;

        float random(vec2 st) { return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123); }

        void main() {
            vColor = mix(color, color1, uMorphProgress);
            vec3 morphedPos = mix(position, position1, uMorphProgress);

            float noiseOffset = random(position.xy) * 6.28;
            morphedPos.x += sin(position.y * 0.2 + uTime * 0.8 + noiseOffset) * 0.4;
            morphedPos.y += cos(position.z * 0.2 + uTime * 0.8 + noiseOffset) * 0.4;
            morphedPos.z += sin(position.x * 0.2 + uTime * 0.8 + noiseOffset) * 0.4;

            morphedPos *= uScale;

            vec4 mvPosition = modelViewMatrix * vec4(morphedPos, 1.0);
            
            // FIX 1: Increased base size of the particles so they are clearly visible
            gl_PointSize = 7.0 * (40.0 / -mvPosition.z);
            gl_Position = projectionMatrix * mvPosition;
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying vec3 vColor;
        uniform vec3 uGlobalColor;

        void main() {
            float dist = distance(gl_PointCoord, vec2(0.5));
            if (dist > 0.5) discard;
            
            float alpha = smoothstep(0.5, 0.1, dist);
            
            // FIX 2: Multiply color by 1.5 to push brightness, and increase base alpha to 0.9
            gl_FragColor = vec4(vColor * uGlobalColor * 1.5, alpha * 0.9);
        }
    </script>

    <script>
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x030303, 0.012); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 50; 

        const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
        
        renderer.toneMapping = THREE.ACESFilmicToneMapping; 
        // FIX 3: Boost overall scene exposure so colors pop beautifully
        renderer.toneMappingExposure = 1.8;
        document.body.appendChild(renderer.domElement);

        const renderScene = new THREE.RenderPass(scene, camera);
        // FIX 4: Increase Bloom Strength from 1.5 to 2.5 for a vivid neon glow
        const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.5, 0.5, 0.1);
        
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        const particleCount = 12000; 
        const baseGeometry = new THREE.BufferGeometry();
        
        const shapes = { SPHERE: 0, HEART: 1, FLOWER: 2, SATURN: 3, TORUS: 4, SPIRAL: 5, GALAXY: 6 };
        const shapeConfigs = [
            { type: shapes.SPHERE, r: 18, color: 0x00d2ff }, // Cyan
            { type: shapes.GALAXY, r: 22, color: 0xff5500 }, // Fire Orange
            { type: shapes.TORUS,  r: 15, color: 0xaa00ff }, // Deep Purple
            { type: shapes.HEART,  r: 18, color: 0xff0066 }, // Neon Pink
            { type: shapes.SPIRAL, r: 12, color: 0x00ffaa }, // Mint Green
            { type: shapes.FLOWER, r: 18, color: 0xccff00 }, // Acid Yellow
            { type: shapes.SATURN, r: 18, color: 0xffaa00 }  // Solar Gold
        ];

        let currentShapeIndex = 0;
        let isMorphing = false;
        let morphStartTime = 0;
        const morphDuration = 1500; 

        function generateShape(shapeConfig) {
            const data = new Float32Array(particleCount * 3);
            const r = shapeConfig.r;
            for (let i = 0; i < particleCount; i++) {
                let x, y, z;
                const idx = i * 3;
                
                if (shapeConfig.type === shapes.SPHERE) {
                    const phi = Math.acos(-1 + (2 * i) / particleCount);
                    const theta = Math.sqrt(particleCount * Math.PI) * phi;
                    x = r * Math.cos(theta) * Math.sin(phi);
                    y = r * Math.sin(theta) * Math.sin(phi);
                    z = r * Math.cos(phi);
                } 
                else if (shapeConfig.type === shapes.HEART) {
                    const t = Math.PI * 2 * (i / particleCount);
                    x = r * Math.pow(Math.sin(t), 3);
                    y = (15/18*r) * Math.cos(t) - (5/18*r) * Math.cos(2 * t) - (2/18*r) * Math.cos(3 * t) - (1/18*r) * Math.cos(4 * t);
                    z = (Math.random() - 0.5) * 4; 
                } 
                else if (shapeConfig.type === shapes.FLOWER) {
                    const petals = 5;
                    const theta = (i / particleCount) * Math.PI * 2 * petals; 
                    const petalR = r * Math.cos(petals * theta) + Math.random() * 2; 
                    x = petalR * Math.cos(theta);
                    y = petalR * Math.sin(theta);
                    z = (Math.random() - 0.5) * 4;
                }
                else if (shapeConfig.type === shapes.SATURN) {
                    if (i < particleCount * 0.25) {
                        const phi = Math.acos(-1 + (2 * (i / 0.25)) / particleCount);
                        const theta = Math.sqrt(particleCount * Math.PI) * phi;
                        x = 9 * Math.cos(theta) * Math.sin(phi);
                        y = 9 * Math.sin(theta) * Math.sin(phi);
                        z = 9 * Math.cos(phi);
                    } else {
                        const t = Math.PI * 2 * (i / (particleCount * 0.75));
                        const ringR = 14 + Math.random() * 10;
                        x = ringR * Math.cos(t);
                        y = (Math.random() - 0.5) * 1.5;
                        z = ringR * Math.sin(t);
                    }
                }
                else if (shapeConfig.type === shapes.TORUS) {
                    const u = Math.random() * Math.PI * 2;
                    const v = Math.random() * Math.PI * 2;
                    const tubeR = 5;
                    x = (r + tubeR * Math.cos(v)) * Math.cos(u);
                    y = (r + tubeR * Math.cos(v)) * Math.sin(u);
                    z = tubeR * Math.sin(v);
                }
                else if (shapeConfig.type === shapes.SPIRAL) { 
                    const t = (i / particleCount) * Math.PI * 8; 
                    const arm = i % 2 === 0 ? 0 : Math.PI; 
                    x = r * Math.cos(t + arm);
                    y = (i / particleCount) * 40 - 20; 
                    z = r * Math.sin(t + arm);
                }
                else if (shapeConfig.type === shapes.GALAXY) {
                    const arms = 3;
                    const armOffset = (i % arms) * (Math.PI * 2 / arms);
                    const distFromCenter = Math.random();
                    const angle = distFromCenter * Math.PI * 3 + armOffset; 
                    const scatter = (Math.random() - 0.5) * (1.0 - distFromCenter) * 10; 
                    x = Math.cos(angle) * distFromCenter * r + scatter;
                    y = (Math.random() - 0.5) * 3; 
                    z = Math.sin(angle) * distFromCenter * r + scatter;
                }

                data[idx] = x; data[idx + 1] = y; data[idx + 2] = z;
            }
            return data;
        }

        const initialPositions = generateShape(shapeConfigs[0]);
        baseGeometry.setAttribute('position', new THREE.BufferAttribute(initialPositions, 3));
        
        const baseColors = new Float32Array(particleCount * 3);
        const col = new THREE.Color(shapeConfigs[0].color);
        for(let i=0; i<baseColors.length; i+=3) { baseColors[i]=col.r; baseColors[i+1]=col.g; baseColors[i+2]=col.b; }
        baseGeometry.setAttribute('color', new THREE.BufferAttribute(baseColors, 3));

        baseGeometry.setAttribute('position1', new THREE.BufferAttribute(new Float32Array(initialPositions), 3));
        baseGeometry.setAttribute('color1', new THREE.BufferAttribute(new Float32Array(baseColors), 3));

        const material = new THREE.ShaderMaterial({
            vertexShader: document.getElementById('vertexShader').textContent,
            fragmentShader: document.getElementById('fragmentShader').textContent,
            transparent: true,
            blending: THREE.AdditiveBlending, 
            depthWrite: false, 
            vertexColors: true, 
            uniforms: {
                uTime: { value: 0.0 },
                uMorphProgress: { value: 1.0 },
                uScale: { value: 1.0 },
                uGlobalColor: { value: new THREE.Color(0xffffff) } 
            }
        });

        const particles = new THREE.Points(baseGeometry, material);
        scene.add(particles);

        function triggerMorph() {
            if (isMorphing) return; 
            
            const posAttr = baseGeometry.attributes.position;
            const targetPosAttr = baseGeometry.attributes.position1;
            const colAttr = baseGeometry.attributes.color;
            const targetColAttr = baseGeometry.attributes.color1;

            posAttr.array.set(targetPosAttr.array);
            posAttr.needsUpdate = true;
            colAttr.array.set(targetColAttr.array);
            colAttr.needsUpdate = true;
            
            currentShapeIndex = (currentShapeIndex + 1) % shapeConfigs.length;
            const nextConfig = shapeConfigs[currentShapeIndex];

            targetPosAttr.array.set(generateShape(nextConfig));
            targetPosAttr.needsUpdate = true;

            const targetCol = new THREE.Color(nextConfig.color);
            for(let i=0; i<targetColAttr.array.length; i+=3) { 
                targetColAttr.array[i] = targetCol.r; 
                targetColAttr.array[i+1] = targetCol.g; 
                targetColAttr.array[i+2] = targetCol.b; 
            }
            targetColAttr.needsUpdate = true;

            isMorphing = true;
            morphStartTime = performance.now();
            material.uniforms.uMorphProgress.value = 0.0;
        }

        const videoElement = document.getElementById('videoElement');
        let targetScale = 1;
        let pinchCooldown = 0;
        let handColorCurrent = new THREE.Color(0xffffff);
        let handColorTarget = new THREE.Color(0xffffff);

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        
        hands.setOptions({ 
            maxNumHands: 1, 
            modelComplexity: 1, 
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7 
        });

        hands.onResults((results) => {
            const statusEl = document.getElementById('status');
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                statusEl.innerText = "Tracking Active"; statusEl.style.color = "#00ffaa";
                
                const landmarks = results.multiHandLandmarks[0];
                
                const thumb = landmarks[4], index = landmarks[8];
                const pinchDist = Math.hypot(thumb.x - index.x, thumb.y - index.y);

                const wrist = landmarks[0], middle = landmarks[12];
                const openDist = Math.hypot(wrist.x - middle.x, wrist.y - middle.y);

                if (pinchDist < 0.06 && pinchCooldown <= 0) {
                    triggerMorph();
                    pinchCooldown = 80; 
                }

                if (openDist > 0.4) {
                    targetScale = 1.6; 
                } else if (openDist < 0.22) {
                    targetScale = 0.5; 
                    const neonPalettes = [0xff00ff, 0x00ffff, 0xffff00, 0xff3300];
                    handColorTarget.set(neonPalettes[Math.floor(Math.random()*neonPalettes.length)]);
                } else {
                    targetScale = 1.0; 
                }
            } else {
                statusEl.innerText = "Hand Lost - Show Hand to Camera"; statusEl.style.color = "rgba(255,255,255,0.5)";
                targetScale = 1.0; 
                handColorTarget.set(0xffffff); 
            }
            if (pinchCooldown > 0) pinchCooldown--;
        });

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480,
            facingMode: 'user' 
        });
        
        cameraUtils.start().catch(()=>{
            document.getElementById('status').innerText = "Camera Denied. Must use HTTPS/Localhost.";
            document.getElementById('status').style.color = "#ff3300";
        });

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();

            material.uniforms.uTime.value = elapsedTime;
            material.uniforms.uScale.value = THREE.MathUtils.lerp(material.uniforms.uScale.value, targetScale, 0.08);
            
            handColorCurrent.lerp(handColorTarget, 0.05);
            material.uniforms.uGlobalColor.value = handColorCurrent;

            if (isMorphing) {
                const morphTimeElapsed = performance.now() - morphStartTime;
                let progress = morphTimeElapsed / morphDuration;
                
                progress = Math.min(1.0, progress);
                progress = progress < 0.5 ? 2 * progress * progress : -1 + (4 - 2 * progress) * progress; 

                material.uniforms.uMorphProgress.value = progress;

                if (progress >= 1.0) isMorphing = false;
            }

            particles.rotation.y = elapsedTime * 0.06;
            particles.rotation.x = elapsedTime * 0.03;

            composer.render();
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
